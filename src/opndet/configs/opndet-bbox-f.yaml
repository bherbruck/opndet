# opndet-bbox-f: femto variant. Targeting ~25K params for the smallest viable
# detector that still actually detects. Honest take: quality drops noticeably
# below pico — use only when memory is critical (sub-1MB int8 deployment).
# Stride 4, output [1, 5, 96, 128].

model:
  in_ch: 3
  img_h: 384
  img_w: 512
  layers:
    - {name: stem, from: 0,    module: ConvBnAct, args: {in_ch: 3,   out_ch: 4,  k: 3, s: 2}}
    - {name: p1,   from: stem, module: CSPBlock,  args: {in_ch: 4,   out_ch: 8,  n: 1, s: 2}}
    - {name: p2,   from: p1,   module: CSPBlock,  args: {in_ch: 8,   out_ch: 16, n: 1, s: 2}}
    - {name: p3,   from: p2,   module: CSPBlock,  args: {in_ch: 16,  out_ch: 24, n: 1, s: 2}}
    - {name: p4,   from: p3,   module: CSPBlock,  args: {in_ch: 24,  out_ch: 32, n: 1, s: 2}}

    - {name: lat4, from: p4,   module: ConvBnAct, args: {in_ch: 32,  out_ch: 16, k: 1}}
    - {name: lat3, from: p3,   module: ConvBnAct, args: {in_ch: 24,  out_ch: 16, k: 1}}
    - {name: lat2, from: p2,   module: ConvBnAct, args: {in_ch: 16,  out_ch: 16, k: 1}}
    - {name: lat1, from: p1,   module: ConvBnAct, args: {in_ch: 8,   out_ch: 16, k: 1}}

    - {name: up4,   from: lat4,        module: ResizeNearest2x, args: {}}
    - {name: add3,  from: [up4, lat3], module: Add,             args: {}}
    - {name: fuse3, from: add3,        module: ConvBnAct,       args: {in_ch: 16, out_ch: 16, k: 3}}
    - {name: up3,   from: fuse3,       module: ResizeNearest2x, args: {}}
    - {name: add2,  from: [up3, lat2], module: Add,             args: {}}
    - {name: fuse2, from: add2,        module: ConvBnAct,       args: {in_ch: 16, out_ch: 16, k: 3}}
    - {name: up2,   from: fuse2,       module: ResizeNearest2x, args: {}}
    - {name: add1,  from: [up2, lat1], module: Add,             args: {}}
    - {name: nout,  from: add1,        module: ConvBnAct,       args: {in_ch: 16, out_ch: 16, k: 3}}

    - {name: trunk, from: nout,  module: ConvBnAct, args: {in_ch: 16, out_ch: 16, k: 3}}
    - {name: raw,   from: trunk, module: Conv,      args: {in_ch: 16, out_ch: 5,  k: 1, bias_init: [-2.19, 0.0, 0.0, 0.0, 0.0]}}

    - {name: obj_r, from: raw,   module: SplitChannels,       args: {start: 0, end: 1}}
    - {name: obj,   from: obj_r, module: SigmoidPeakSuppress, args: {k: 3, eps: 1.0e-3}}
    - {name: cxy_r, from: raw,   module: SplitChannels,       args: {start: 1, end: 3}}
    - {name: cxy,   from: cxy_r, module: Sigmoid,             args: {}}
    - {name: wh_r,  from: raw,   module: SplitChannels,       args: {start: 3, end: 5}}
    - {name: wh,    from: wh_r,  module: Sigmoid,             args: {}}
    - {name: out,   from: [obj, cxy, wh], module: Concat,     args: {dim: 1}}

  outputs:
    - {name: output, from: out, activation: none}
