# opndet training config. Drives src/opndet/train.py.
# Works for ANY single-class detection task: point at COCO json(s) + image dir(s).

runs_dir: runs            # parent dir for all run output
name: exp1                # this run's subdir; override with `--run-name $(date +%s)`
auto_increment: true      # if runs_dir/name exists+nonempty, save to ..._2, _3, ...
seed: 0
device: auto              # auto | cpu | cuda
amp: true
amp_dtype: fp16           # fp16 (default; needs GradScaler) or bf16 (H100/A100 — no scaler, faster)
cache_images: false       # cache decoded RGB in worker RAM after first epoch (saves JPEG decode)
vis_samples: 4            # # val images logged to TensorBoard
vis_every: 5              # log image grid every N epochs (scalars still logged every epoch)

model_config: bbox-s          # bundled preset name (bbox-n | bbox-s | bbox-m) or path to a YAML
model:
  stride: 4               # must match the model's output stride

data:
  # one or more sources merged into a single pool, then split.
  sources:
    - {coco: data/site_a/_annotations.coco.json, images: data/site_a}
    # add more here, e.g.:
    # - {coco: data/site_b/anno.json, images: data/site_b/imgs}
  split_ratios: [0.8, 0.1, 0.1]   # train/val/test

batch_size: 64            # bbox-s ≈ 1.3M params; bump to 256 on H100
num_workers: 8
prefetch_factor: 4
epochs: 100
patience: 15            # early-stop if best metric hasn't improved in this many epochs (0 = off)
metric_for_best: f1     # f1 | map50 | map_50_95 | f1_cal | map50_cal | map_50_95_cal
                        # _cal versions select on the post-calibration metric (forces calibrate_every=1)
                        # — picks the "best deployed" checkpoint, not just the best raw one
lr: 3.0e-3
weight_decay: 1.0e-4
warmup_steps: 200
eval_threshold: 0.3

augment:
  enabled: true
  brightness: 0.4
  contrast: 0.4
  gamma: [0.6, 1.6]
  hue: 20
  saturation: 0.5
  grayscale_prob: 0.2
  blur_prob: 0.1
  noise_sigma: 0.02
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate90_prob: 0.5
  scale_jitter: [0.7, 1.3]
  translate_frac: 0.1
  mosaic_prob: 0.5            # combine 4 images into 1, strong regularization
  cutout_prob: 0.3            # randomly erase rectangles
  cutout_count: 3
  cutout_size_frac: [0.05, 0.20]
  min_visible_frac: 0.5       # drop GT boxes whose visible area falls below this

ema_decay: 0.999          # 0 = off; 0.999 is yolov8 default. Eval + best.pt use EMA weights when on.

# Calibration (Platt-style temperature on the obj sigmoid).
auto_calibrate: true      # at end of training, fit T on val + bake into best.pt + re-run test eval (calibrated)
calibrate_every: 0        # 0 = off; >0 = fit T every N epochs and log eval/T, eval/ece_pre, eval/ece_post to TB
test_every: 0             # 0 = off; >0 = run test eval every N epochs (logs test/* scalars and test/preds images)
test_samples: null        # # test images for the test/preds grid; null/0 = use vis_samples value

# Distillation hyperparams (used when `opndet train --teacher PATH` or --self-distill is set).
# Path lives only on the CLI — keeps yaml reproducible across machines (Colab won't have your
# local /content/runs path). Block is harmless when distillation isn't enabled.
distill:
  hm_weight: 1.0          # weight on KD heatmap BCE at gated cells
  reg_weight: 0.5         # weight on KD L1 over (cxy, wh) at gated cells
  conf_gate: 0.5          # only distill where teacher's peak-suppressed obj > gate

loss:
  w_hm: 1.0
  w_cxy: 1.0
  w_wh: 1.5               # GIoU/CIoU loss is 0..2 range so weight should be near 1, not 5
  focal_alpha: 2.0
  focal_beta: 4.0
  wh_loss: ciou           # l1 | giou | ciou | nwd. ciou is the universal best-default for normal-size objects.
  cls_loss: focal         # focal | vfl. vfl pushes confidence toward IoU quality — use when you need bimodal
                          #   confidence (clear=0.95+, noise=0.05-) for tracking pipelines that can't tolerate flapping.
  vfl_alpha: 0.75
  vfl_gamma: 2.0
  repulsion_weight: 0.0   # set ~0.5 for crowded scenes with touching objects (only used with iou-based wh_loss)
  nwd_c: 12.8             # only used when wh_loss: nwd
  count_weight: 0.0       # >0 enables the count-aware term: λ · |Σ pred_peaks - n_gt| per image.
                          #   Pushes total mass at peak cells toward the GT count. ~0.05-0.1 is a sane start.
                          #   Most useful for industrial counting where mAP can hide miscount.
                          #   peak_kernel and peak_eps are auto-mirrored from the model's
                          #   (Sigmoid)PeakSuppress layer; only set them here to override.
  convexity_weight: 0.0   # >0 penalizes mass-weighted centroid offset of the obj heatmap in a small
                          #   neighborhood of each positive cell. Forces symmetric / radially round
                          #   peaks — exploits the convex-object prior. ~0.1-0.5 is sane. l_convex
                          #   is logged when on.
  convexity_radius: 2     # neighborhood radius (k=2 -> 5×5 patch around each positive cell)
