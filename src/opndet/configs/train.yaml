# opndet training config. Drives src/opndet/train.py.
# Works for ANY single-class detection task: point at COCO json(s) + image dir(s).

out_dir: runs/exp1
auto_increment: true      # if out_dir exists+nonempty, save to <out_dir>_2, _3, ...
seed: 0
device: auto              # auto | cpu | cuda
amp: true
vis_samples: 8            # # val images logged to TensorBoard each epoch

model_config: bbox-s          # bundled preset name (bbox-n | bbox-s | bbox-m) or path to a YAML
model:
  stride: 4               # must match the model's output stride

data:
  # one or more sources merged into a single pool, then split.
  sources:
    - {coco: data/site_a/_annotations.coco.json, images: data/site_a}
    # add more here, e.g.:
    # - {coco: data/site_b/anno.json, images: data/site_b/imgs}
  split_ratios: [0.8, 0.1, 0.1]   # train/val/test

batch_size: 64            # bbox-s ≈ 1.3M params; bump to 256 on H100
num_workers: 8
prefetch_factor: 4
epochs: 100
lr: 3.0e-3
weight_decay: 1.0e-4
warmup_steps: 200
eval_threshold: 0.3

augment:
  enabled: true
  brightness: 0.4
  contrast: 0.4
  gamma: [0.6, 1.6]
  hue: 20
  saturation: 0.5
  grayscale_prob: 0.2
  blur_prob: 0.1
  noise_sigma: 0.02
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate90_prob: 0.5
  scale_jitter: [0.7, 1.3]
  translate_frac: 0.1

loss:
  w_hm: 1.0
  w_cxy: 1.0
  w_wh: 5.0
  focal_alpha: 2.0
  focal_beta: 4.0
