# opndet training config. Drives src/opndet/train.py.
# Works for ANY single-class detection task: point at COCO json(s) + image dir(s).

runs_dir: runs            # parent dir for all run output
name: exp1                # this run's subdir; override with `--run-name $(date +%s)`
auto_increment: true      # if runs_dir/name exists+nonempty, save to ..._2, _3, ...
seed: 0
device: auto              # auto | cpu | cuda
amp: true
amp_dtype: fp16           # fp16 (default; needs GradScaler) or bf16 (H100/A100 — no scaler, faster)
cache_images: false       # cache decoded RGB in worker RAM after first epoch (saves JPEG decode)
vis_samples: 4            # # val images logged to TensorBoard
vis_every: 5              # log image grid every N epochs (scalars still logged every epoch)

model_config: bbox-s          # bundled preset name (bbox-n | bbox-s | bbox-m) or path to a YAML
model:
  stride: 4               # must match the model's output stride

data:
  # one or more sources merged into a single pool, then split.
  sources:
    - {coco: data/site_a/_annotations.coco.json, images: data/site_a}
    # add more here, e.g.:
    # - {coco: data/site_b/anno.json, images: data/site_b/imgs}
  split_ratios: [0.8, 0.1, 0.1]   # train/val/test

batch_size: 64            # bbox-s ≈ 1.3M params; bump to 256 on H100
num_workers: 8
prefetch_factor: 4
epochs: 100
patience: 15            # early-stop if F1 hasn't improved in this many epochs (0 = off)
lr: 3.0e-3
weight_decay: 1.0e-4
warmup_steps: 200
eval_threshold: 0.3

augment:
  enabled: true
  brightness: 0.4
  contrast: 0.4
  gamma: [0.6, 1.6]
  hue: 20
  saturation: 0.5
  grayscale_prob: 0.2
  blur_prob: 0.1
  noise_sigma: 0.02
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate90_prob: 0.5
  scale_jitter: [0.7, 1.3]
  translate_frac: 0.1
  mosaic_prob: 0.5            # combine 4 images into 1, strong regularization
  cutout_prob: 0.3            # randomly erase rectangles
  cutout_count: 3
  cutout_size_frac: [0.05, 0.20]
  min_visible_frac: 0.5       # drop GT boxes whose visible area falls below this

loss:
  w_hm: 1.0
  w_cxy: 1.0
  w_wh: 5.0
  focal_alpha: 2.0
  focal_beta: 4.0
