# Minimum-viable opndet train.yaml — everything not specified inherits sane per-preset
# defaults from src/opndet/training_defaults.py (LR scales with model size, aug profile
# scales with capacity, etc).  Run `opndet info` to see all presets.

runs_dir: runs
name: exp1

model_config: bbox-s          # bbox-f | bbox-p | bbox-n | bbox-s | bbox-m
                              # bbox-l | bbox-x | bbox-h | bbox-g | bbox-t   (and -dist variants)

data:
  sources:
    - {coco: data/site_a/_annotations.coco.json, images: data/site_a}
  # split_ratios: [0.8, 0.1, 0.1]   # default

epochs: 100

# Common overrides users actually want to set. Uncomment any to override the per-preset defaults.
#
# patience: 30
# patience_smart: true            # default true — won't stop while any tracked metric improves
# metric_for_best: f1_opt_cal     # default — selects best.pt by calibrated F1 at auto-detected threshold
#
# batch_size: 64                  # default scales with size: f/p=256, s/n=128, m/l=64, x=32, h/g/t=16
# lr: 3.0e-3                      # default scales: bbox-m=3e-3, halves per ~4x params (bbox-x=1.5e-3, bbox-t=5e-4)
# warmup_steps: 200               # default 200, bigger sizes get longer
#
# vis_samples: 4                  # default 4 — image grid count for val/preds
# vis_every: 5                    # default 5 — log image grid every N epochs
# vis_threshold: 0.05             # default = eval_threshold (shows what's ABOVE deployment cutoff,
                                  #   color-coded so marginal preds near the threshold are visible).
                                  #   Lower to ~0.05 to see everything for over-prediction debugging.
# test_samples: 4
# test_every: 0                   # default 0 — test eval at end only; >0 logs test/* every N epochs
#
# calibrate_every: 1              # default 1 — fits T per epoch + recomputes calibrated metrics
# auto_calibrate: true            # default true — final auto-calibrate at end of training
#
# loss:
#   wh_loss: ciou                 # default
#   cls_loss: vfl                 # default — bimodal confidence
#   count_weight: 0.05            # >0 enables count-aware loss term
#   convexity_weight: 0.2         # >0 enforces radially-symmetric peaks
#   repulsion_weight: 0.5         # >0 for crowded touching objects
#
# augment:                        # full per-tier defaults already set; override here if needed
#   mosaic_prob: 0.0              # bbox-f/p default; bbox-s+ default 0.1; bbox-h+ default 0.3
#   cutout_prob: 0.0
#
# distill:                        # used only with --teacher PATH or --self-distill on the CLI
#   hm_weight: 1.0                # default; bumped to 1.5 for tiny students (auto)
#   reg_weight: 0.5               # default; bumped to 0.75 for tiny students (auto)
#   conf_gate: 0.5
#   full_distill: false           # true: BCE on every cell (anti-FP supervision)
#   neg_gate: 0.0                 # asymmetric mode when >0
#   kd_temperature: 1.0
